<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            pointer-events: none;
        }
        #notice {
            display: none;
            position: fixed;
            top: 2vh;
            left: 1.2vw;
            max-width: min(92vw, 640px);
            padding: 12px 18px;
            font-family: system-ui, -apple-system, "Segoe UI", "Meiryo", "Yu Gothic UI", sans-serif;
            font-size: clamp(17px, 2.1vh, 22px);
            font-weight: 700;
            line-height: 1.5;
            color: #ff6b6b;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95), 0 1px 2px #000;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #notice.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div id="notice" role="status" aria-live="polite"></div>
    <script>
        window.addEventListener('message', function (event) {
            var data = event.data;
            if (!data || data.action !== 'rentalCrime') return;
            var el = document.getElementById('notice');
            if (data.show) {
                el.textContent = data.text || '';
                el.classList.add('visible');
            } else {
                el.classList.remove('visible');
                el.textContent = '';
            }
        });
    </script>
</body>
</html>
