<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Drugs Process UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" style="display: none;">
    <div class="panel">
      <div class="panel-header">
        <h1>薬物精製ラボ</h1>
        <button id="closeBtn" class="close-btn" type="button">×</button>
      </div>
      <p class="sub">左で投入素材を選択して、右の投入素材一覧を作成します</p>

      <div class="grid">
        <div class="col">
          <label class="label">投入素材</label>
          <div id="materialGrid" class="material-grid"></div>
        </div>

        <div class="col">
          <label class="label">投入した素材一覧</label>
          <div id="selectedInfo" class="selected-info">素材を選択してください</div>
          <div id="selectedList" class="selected-list"></div>
          <div id="recipeInfo" class="recipe-info"></div>
        </div>
      </div>

      <div class="actions">
        <button id="submitBtn" class="btn primary" type="button">精製する</button>
        <button id="cancelBtn" class="btn secondary" type="button">キャンセル</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
